repos:
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        # PR #25: pre-existing style 위반(E1xx/E2xx/E7xx 일부, F541) 일괄 ignore. 별도 cleanup PR로 정리 예정.
        args: ['--max-line-length=120', '--ignore=E501,W503,E402,E127,E128,E129,E131,E202,E221,E225,E226,E227,E231,E241,E251,E261,E262,E265,E266,E271,E272,E301,E302,E303,E305,E306,E701,E702,E731,E741,F541,F811,F824,F841']

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
