version: '3.8'

services:
  dashboard:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - OPENCLAW_CONFIG_DIR=/app
      - OPENCLAW_WORKSPACE_DIR=/app
      - OPENCLAW_LOG_DIR=/app/logs
    volumes:
      - ./brain:/app/brain
      - ./logs:/app/logs
      - /home/wlsdud5035/.openclaw/logs:/app/external_logs:ro
      - /home/wlsdud5035/.openclaw/.docker-secrets:/run/secrets/openclaw:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 60s
      timeout: 10s
      retries: 3

  btc-agent:
    build: .
    command: ["bash", "-c", "while true; do python btc/btc_trading_agent.py; sleep 600; done"]
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - OPENCLAW_CONFIG_DIR=/app
      - OPENCLAW_WORKSPACE_DIR=/app
      - OPENCLAW_LOG_DIR=/app/logs
    volumes:
      - ./brain:/app/brain
      - ./logs:/app/logs
      - /home/wlsdud5035/.openclaw/.docker-secrets:/run/secrets/openclaw:ro
    restart: unless-stopped
    depends_on:
      - dashboard

  kr-agent:
    build: .
    command: ["bash", "-c", "while true; do python stocks/stock_trading_agent.py; sleep 600; done"]
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - OPENCLAW_CONFIG_DIR=/app
      - OPENCLAW_WORKSPACE_DIR=/app
      - OPENCLAW_LOG_DIR=/app/logs
    volumes:
      - ./brain:/app/brain
      - ./logs:/app/logs
      - /home/wlsdud5035/.openclaw/.docker-secrets:/run/secrets/openclaw:ro
    restart: unless-stopped

  us-agent:
    build: .
    command: ["bash", "-c", "while true; do python stocks/us_stock_trading_agent.py; sleep 900; done"]
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - OPENCLAW_CONFIG_DIR=/app
      - OPENCLAW_WORKSPACE_DIR=/app
      - OPENCLAW_LOG_DIR=/app/logs
    volumes:
      - ./brain:/app/brain
      - ./logs:/app/logs
      - /home/wlsdud5035/.openclaw/.docker-secrets:/run/secrets/openclaw:ro
    restart: unless-stopped

  us-agent-check:
    build: .
    command: ["bash", "-c", "while true; do python stocks/us_stock_trading_agent.py check; sleep 60; done"]
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - OPENCLAW_CONFIG_DIR=/app
      - OPENCLAW_WORKSPACE_DIR=/app
      - OPENCLAW_LOG_DIR=/app/logs
    volumes:
      - ./brain:/app/brain
      - ./logs:/app/logs
      - /home/wlsdud5035/.openclaw/.docker-secrets:/run/secrets/openclaw:ro
    restart: unless-stopped
    depends_on:
      - dashboard

  telegram-bot:
    build: .
    command: ["bash", "-c", "while true; do python stocks/telegram_bot.py; sleep 5; done"]
    env_file: .env
    environment:
      - PYTHONPATH=/app
      - OPENCLAW_CONFIG_DIR=/app
      - OPENCLAW_WORKSPACE_DIR=/app
      - OPENCLAW_LOG_DIR=/app/logs
    volumes:
      - ./brain:/app/brain
      - ./logs:/app/logs
      - /home/wlsdud5035/.openclaw/.docker-secrets:/run/secrets/openclaw:ro
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      # PR #21: 자동 provisioning (datasource + dashboard JSON)
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
