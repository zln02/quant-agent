name: OpenClaw CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install flake8 isort
          pip install -r requirements.txt
      - name: Lint (flake8)
        run: |
          # ignore 패턴은 .pre-commit-config.yaml 과 동기화 — PR #22 이후 점진 cleanup 중
          # W293/E203/W504 추가는 PR #23 잔여 위반 흡수 (style only)
          flake8 --max-line-length=120 \
            --ignore=E501,W503,W504,W291,W293,E203,E402,E127,E128,E129,E131,E202,E221,E225,E226,E227,E231,E241,E251,E261,E262,E265,E266,E271,E272,E301,E302,E303,E305,E306,E701,E702,E731,E741,F401,F541,F811,F824,F841 \
            common/ btc/ stocks/ agents/ quant/
      - name: Import sort check
        run: isort --check-only --diff common/ btc/ stocks/ agents/ quant/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        env:
          DRY_RUN: "1"
          SUPABASE_URL: "https://mock.supabase.co"
          SUPABASE_SECRET_KEY: "mock-key"
          OPENAI_API_KEY: "test-key"
          UPBIT_ACCESS_KEY: "test-key"
          UPBIT_SECRET_KEY: "test-key"
          TELEGRAM_BOT_TOKEN: "test-token"
          TELEGRAM_CHAT_ID: "123456"
        run: |
          pytest tests/ -v --tb=short --cov=common --cov=quant \
            --cov-report=term-missing --cov-fail-under=30

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for .env files
        run: |
          if git ls-files | grep -E '\.env$' | grep -v '\.example'; then
            echo "ERROR: .env file tracked in git!"
            exit 1
          fi
      - name: Check for hardcoded API keys
        run: |
          if grep -rn 'sk-[a-zA-Z0-9]\{20,\}' --include='*.py' .; then
            echo "ERROR: Possible hardcoded API key found!"
            exit 1
          fi
